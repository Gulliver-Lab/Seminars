<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Seminars</title>
    <style>
      :root {
        color-scheme: light;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #f6f7f9;
        color: #1c2430;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
      }

      main {
        min-height: 100vh;
        padding: 24px;
      }

      .page-header {
        align-items: end;
        display: flex;
        gap: 16px;
        justify-content: space-between;
        margin-bottom: 16px;
      }

      h1 {
        font-size: 24px;
        font-weight: 650;
        line-height: 1.2;
        margin: 0;
      }

      .count {
        color: #586576;
        font-size: 14px;
        white-space: nowrap;
      }

      .sheet {
        background: #ffffff;
        border: 1px solid #d9dee7;
        overflow: auto;
        width: 100%;
      }

      table {
        border-collapse: separate;
        border-spacing: 0;
        font-size: 14px;
        min-width: 1120px;
        table-layout: fixed;
        width: 100%;
      }

      th,
      td {
        border-bottom: 1px solid #e2e7ef;
        border-right: 1px solid #e2e7ef;
        line-height: 1.35;
        padding: 9px 10px;
        text-align: left;
        vertical-align: top;
      }

      th {
        background: #eef2f7;
        color: #2f3a48;
        position: sticky;
        top: 0;
        z-index: 1;
      }

      .column-header {
        align-items: center;
        display: flex;
        gap: 8px;
        justify-content: space-between;
      }

      .column-label {
        font-size: 12px;
        font-weight: 700;
        text-transform: uppercase;
      }

      .sort-controls {
        display: inline-flex;
        gap: 3px;
      }

      .sort-control {
        align-items: center;
        border: 1px solid #c6cfdb;
        color: #465365;
        display: inline-flex;
        font-size: 12px;
        height: 22px;
        justify-content: center;
        line-height: 1;
        text-decoration: none;
        width: 22px;
      }

      .sort-control:hover,
      .sort-control.active {
        background: #dbe3ee;
        border-color: #98a8bb;
        color: #1c2430;
      }

      tr:nth-child(even) td {
        background: #fafbfc;
      }

      th:first-child,
      td:first-child {
        border-left: 0;
        font-weight: 650;
        width: 180px;
      }

      th:last-child,
      td:last-child {
        border-right: 0;
      }

      tbody tr:last-child td {
        border-bottom: 0;
      }

      .empty {
        color: #586576;
        padding: 28px;
      }

      @media (max-width: 700px) {
        main {
          padding: 14px;
        }

        .page-header {
          align-items: start;
          flex-direction: column;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <div class="page-header">
        <h1>Speakers</h1>
        <div class="count">{{ speakers | length }} rows</div>
      </div>

      <div class="sheet">
        {% if speakers %}
          <table aria-label="Speakers">
            <thead>
              <tr>
                {% for key, label in columns %}
                  <th scope="col">
                    <div class="column-header">
                      <span class="column-label">{{ label }}</span>
                      <span class="sort-controls" aria-label="Sort {{ label }}">
                        <a
                          class="sort-control{% if active_sort == key and active_direction == 'asc' %} active{% endif %}"
                          href="?sort={{ key }}&amp;direction=asc"
                          title="Sort {{ label }} ascending"
                          aria-label="Sort {{ label }} ascending"
                        >&#8593;</a>
                        <a
                          class="sort-control{% if active_sort == key and active_direction == 'desc' %} active{% endif %}"
                          href="?sort={{ key }}&amp;direction=desc"
                          title="Sort {{ label }} descending"
                          aria-label="Sort {{ label }} descending"
                        >&#8595;</a>
                      </span>
                    </div>
                  </th>
                {% endfor %}
              </tr>
            </thead>
            <tbody>
              {% for speaker in speakers %}
                <tr>
                  {% for key, _ in columns %}
                    <td>{{ speaker[key] }}</td>
                  {% endfor %}
                </tr>
              {% endfor %}
            </tbody>
          </table>
        {% else %}
          <div class="empty">No speakers found.</div>
        {% endif %}
      </div>
    </main>
  </body>
</html>
